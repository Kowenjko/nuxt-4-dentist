version: "3.9"

services:  
  pg:
    image: postgres:18
    container_name: postgres
    environment:
      POSTGRES_DB: dentist
      POSTGRES_USER: dentist
      POSTGRES_PASSWORD: dentist
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentist -d dentist"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  pgdata:
 
